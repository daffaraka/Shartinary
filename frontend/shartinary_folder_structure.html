function badge(b) {
  if (!b) return '';
  return `<span class="badge badge-${b}">${b}</span>`;
}

function renderFile(item, pad=0) {
  const el = document.createElement('li');
  el.style.paddingLeft = pad+'px';
  el.innerHTML = `<div class="file-entry">
    <span class="icon">${item.icon||'📄'}</span>
    <span class="name">${item.name}</span>
    ${badge(item.badge)}
    ${item.desc ? `<span class="desc">${item.desc}</span>` : ''}
  </div>`;
  return el;
}

function renderFolder(item, depth=0) {
  const li = document.createElement('li');
  const isOpen = item.open || false;
  li.className = isOpen ? 'expanded' : 'collapsed';

  const entry = document.createElement('div');
  entry.className = 'entry';
  entry.innerHTML = `
    <span class="icon">${item.icon}</span>
    <span class="name" style="color:${depth===0?'var(--color-text-primary)':'var(--color-text-primary)'};font-weight:${depth===0?600:500}">${item.name}</span>
    ${item.desc ? `<span class="badge" style="background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:10px;padding:1px 7px;border-radius:20px">${item.desc}</span>` : ''}
    <span class="chevron">›</span>
  `;

  entry.addEventListener('click', () => {
    li.classList.toggle('expanded');
    li.classList.toggle('collapsed');
  });

  const childrenEl = document.createElement('ul');
  childrenEl.className = 'tree children';

  (item.children||[]).forEach(child => {
    if (child.type === 'folder') {
      childrenEl.appendChild(renderFolder(child, depth+1));
    } else {
      childrenEl.appendChild(renderFile(child));
    }
  });

  li.appendChild(entry);
  li.appendChild(childrenEl);
  return li;
}

const tree = document.getElementById('tree');
data.forEach(item => {
  if (item.type === 'folder') tree.appendChild(renderFolder(item, 0));
  else tree.appendChild(renderFile(item));
});
